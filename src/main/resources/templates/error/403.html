<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Negado | 403</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass-effect {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-6">

    <div class="max-w-md w-full text-center">
        <div class="mb-8 flex justify-center">
            <div class="relative">
                <div class="absolute inset-0 bg-red-200 rounded-full blur-2xl opacity-50 animate-pulse"></div>
                <div class="relative bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                    <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-shield-alert"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.5 3.8 17 5 19 5a1 1 0 0 1 1 1z"/><path d="M12 8v4"/><path d="M12 16h.01"/></svg>
                </div>
            </div>
        </div>

        <div class="glass-effect border border-white/40 shadow-2xl shadow-slate-200/50 rounded-[2rem] p-10">
            <span class="text-sm font-bold tracking-widest text-red-500 uppercase">Erro 403</span>
            <h1 class="text-3xl font-extrabold text-slate-900 mt-2 mb-4">Acesso Restrito</h1>
            <p class="text-slate-500 leading-relaxed mb-8">
                Ops! Parece que você tentou entrar em uma área protegida. Verifique suas credenciais ou entre em contato com o suporte.
            </p>

            <div class="space-y-3">
                <a th:href="@{/home}" 
                   class="block w-full py-4 px-6 bg-slate-900 hover:bg-slate-800 text-white font-semibold rounded-2xl transition-all duration-200 shadow-lg shadow-slate-900/20 active:scale-[0.98]">
                    Voltar ao Início
                </a>
                
                <button onclick="window.history.back()" 
                        class="block w-full py-4 px-6 bg-white hover:bg-slate-50 text-slate-600 font-medium rounded-2xl border border-slate-200 transition-all duration-200">
                    Tentar Novamente
                </button>
            </div>
        </div>

        <p class="mt-8 text-sm text-slate-400">
            Se você acredita que isso é um erro, <a href="#" class="text-slate-600 underline underline-offset-4 decoration-slate-300">fale conosco</a>.
        </p>
    </div>

</body>
</html>
