<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/image/favicon.ico?v=1" type="image/x-icon">
    <title>Login - Análise Raiz Lactalis CC</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            --accent-color: #f59e0b;
        }

        body {
            height: 100vh;
            background: #f1f5f9;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        /* Fundo decorativo */
        .bg-decoration {
            position: absolute;
            width: 100%;
            height: 100%;
            background: var(--primary-gradient);
            clip-path: polygon(0 0, 100% 0, 100% 70%, 0 100%);
            z-index: -1;
        }

        .login-card {
            background: white;
            border: none;
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            width: 100%;
            max-width: 420px;
            overflow: hidden;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-header {
            padding: 40px 40px 20px;
            text-align: center;
        }

        .brand-logo {
            width: 60px;
            height: 60px;
            background: var(--primary-gradient);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: white;
            font-size: 1.8rem;
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.5);
        }

        .login-title {
            color: #1e293b;
            font-weight: 700;
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .app-name {
            color: #64748b;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .login-body {
            padding: 20px 40px 40px;
        }

        .form-label {
            font-weight: 600;
            color: #475569;
            font-size: 0.85rem;
        }

        .input-group-text {
            background: #f8fafc;
            border-right: none;
            color: #94a3b8;
        }

        .form-control {
            border-left: none;
            padding: 12px;
            background: #f8fafc;
        }

        .form-control:focus {
            box-shadow: none;
            border-color: #cbd5e1;
            background: white;
        }

        .btn-login {
            background: var(--primary-gradient);
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.4);
            opacity: 0.9;
        }

        .password-toggle {
            cursor: pointer;
            padding: 0 15px;
            display: flex;
            align-items: center;
            background: #f8fafc;
            border: 1px solid #dee2e6;
            border-left: none;
            border-radius: 0 8px 8px 0;
            color: #94a3b8;
        }

        .alert-custom {
            border-radius: 12px;
            font-size: 0.85rem;
            padding: 12px;
            border: none;
            background-color: #fee2e2;
            color: #b91c1c;
        }
    </style>
</head>
<body>

    <div class="bg-decoration"></div>

    <div class="container d-flex justify-content-center">
        <div class="login-card">
            <div class="login-header">
                <div class="brand-logo">
                    <i class="fas fa-microscope"></i>
                </div>
                <h1 class="login-title">Acesso Restrito</h1>
                <p class="app-name text-uppercase tracking-wider">Análise Raiz Lactalis CC</p>
            </div>

            <div class="login-body">
                <form th:action="@{/process-login}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    
                    <div class="mb-4">
                        <label class="form-label">Usuário</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-user"></i></span>
                            <input type="text" name="username" class="form-control" placeholder="Seu usuário" required autofocus>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Senha</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-lock"></i></span>
                            <input type="password" name="password" id="password" class="form-control" placeholder="••••••••" required>
                            <span class="password-toggle" onclick="togglePassword()">
                                <i class="fas fa-eye" id="toggleIcon"></i>
                            </span>
                        </div>
                    </div>

                    <div th:if="${param.error}" class="alert alert-custom mb-4 animate__animated animate__shakeX">
                        <i class="fas fa-exclamation-circle me-2"></i> Usuário ou senha inválidos.
                    </div>

                    <button type="submit" class="btn btn-primary btn-login w-100 shadow-sm">
                        Entrar no Sistema
                    </button>
                </form>

                <div class="text-center mt-4">
                    <small class="text-muted">Esqueceu a senha? Contate o administrador.</small>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('toggleIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
    </script>
</body>
</html>
