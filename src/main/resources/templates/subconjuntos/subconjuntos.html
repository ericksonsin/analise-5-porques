<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: head('Subconjuntos')"></head>
<style>
    .card-form { border-radius: 15px; border: none; }
    .btn-action { border-radius: 8px; font-weight: 600; }
    
    /* Esconde a tabela no mobile e mostra cards */
    @media (max-width: 768px) {
        .table-responsive-custom { display: none; }
        .mobile-card { display: block; }
    }
    @media (min-width: 769px) {
        .mobile-card { display: none; }
    }
    
    .sub-item-card {
        background: white;
        border-radius: 12px;
        padding: 15px;
        margin-bottom: 15px;
        border-left: 5px solid #0d6efd;
    }
</style>
<body class="bg-light">

    <div th:replace="fragments/navbar :: navbar"></div>

    <div class="container mt-4 mb-5">
        <div th:replace="fragments/messages :: mensagens"></div>

        <div class="card shadow-sm card-form mb-4">
            <div class="card-body p-4">
                <h3 class="fw-bold mb-4 text-dark">
                    <i class="fas fa-layer-group me-2 text-primary"></i>
                    <span th:text="${subconjunto != null} ? 'Editar Subconjunto' : 'Cadastrar Subconjunto'"></span>
                </h3>

                <form th:action="@{/subconjuntos/salvar}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <input type="hidden" name="id" th:value="${subconjunto != null} ? ${subconjunto.id} : ''" />

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Nome do Subconjunto</label>
                            <input type="text" name="nome" class="form-control form-control-lg shadow-sm"
                                th:value="${subconjunto != null} ? ${subconjunto.nome} : ''" 
                                placeholder="Ex: Motor, Transmissão..." required>
                        </div>
                        <div class="col-12 mb-3">
                            <label class="form-label fw-bold">Descrição</label>
                            <textarea name="descricao" class="form-control shadow-sm" rows="3"
                                placeholder="Detalhes técnicos sobre este subconjunto..."
                                th:text="${subconjunto != null} ? ${subconjunto.descricao} : ''"></textarea>
                        </div>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success btn-action px-4 py-2 shadow-sm">
                            <i class="fas fa-save me-2"></i>Salvar
                        </button>
                        <a th:if="${subconjunto != null}" th:href="@{/subconjuntos}" class="btn btn-outline-secondary btn-action px-4 py-2">
                            Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>

        <hr class="my-4">

        <h4 class="fw-bold mb-3 text-secondary">Lista de Subconjuntos</h4>

        <div class="table-responsive-custom card shadow-sm border-0">
            <table id="tabela" class="table table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th width="80">ID</th>
                        <th>Nome</th>
                        <th>Descrição</th>
                        <th width="100">Ação</th>
                    </tr>
                </thead>
                <tbody class="bg-white">
                    <tr th:each="sub : ${subconjuntos}">
                        <td th:text="${sub.id}" class="fw-bold"></td>
                        <td th:text="${sub.nome}"></td>
                        <td th:text="${sub.descricao}" class="text-muted small"></td>
                        <td>
                            <a th:href="@{/subconjuntos/editar/{id}(id=${sub.id})}" class="btn btn-warning btn-sm btn-action">
                                <i class="fas fa-edit">Editar</i>
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="mobile-card">
            <div th:each="sub : ${subconjuntos}" class="sub-item-card shadow-sm">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <span class="badge bg-primary mb-2" th:text="'ID: ' + ${sub.id}"></span>
                        <h5 class="fw-bold mb-1" th:text="${sub.nome}"></h5>
                        <p class="text-muted small mb-2" th:text="${sub.descricao}"></p>
                    </div>
                    <a th:href="@{/subconjuntos/editar/{id}(id=${sub.id})}" class="btn btn-warning btn-sm p-2 shadow-sm">
                        <i class="fas fa-edit"></i>
                    </a>
                </div>
            </div>
        </div>

    </div>

    <div th:replace="fragments/scripts :: scripts"></div>
</body>
</html>
